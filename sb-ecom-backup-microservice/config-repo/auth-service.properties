# Auth Service Configuration
spring.application.name=auth-service
server.port=8081

# JWT Configuration
app.jwtSecret=mySecretKey123912738aopsgjnspkmndfsopkvajoirjg94gf2opfng2moknm
app.jwtExpirationMs=86400000
app.jwtCookieName=auth-token

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.uuid}

# Frontend URL for CORS
frontend.url=http://localhost:5173

# Microservices URLs (for Feign clients)
user-service.url=http://user-service
property-service.url=http://property-service
transaction-service.url=http://transaction-service

# Logging
logging.level.com.ecommerce.auth=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO