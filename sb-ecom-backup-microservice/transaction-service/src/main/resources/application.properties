spring.application.name=transaction-service
server.port=0

# Database Configuration for Docker
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_transactions
spring.datasource.username=postgres
spring.datasource.password=123456

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.instance-id=${spring.application.name}:${random.uuid}
eureka.instance.prefer-ip-address=true

# Stripe Configuration
stripe.secret.key=sk_test_51ROgtQR5Ad8YeKfV6oScczTb7mFnprPUphDnhGpoBcIZpzvU513fVt04txNYCwTqKcR29xUSuY0SpP3olQdbxy5J00IBmgBepn
stripe.webhook.secret=whsec_a94abbf0575a0616697095a0f1232cc377d036a96fd974c921ebb9f48ae8840b

# Frontend URLs
frontend.success.url=http://localhost:3000/payment/success
frontend.cancel.url=http://localhost:3000/payment/cancel

# Kafka Configuration for Event Publishing
spring.cloud.stream.kafka.binder.brokers=localhost:9092
spring.cloud.stream.bindings.transaction-events-out.destination=transaction-events
spring.cloud.stream.bindings.transaction-events-out.content-type=application/json

# Jackson Configuration for better JSON handling
spring.jackson.deserialization.fail-on-unknown-properties=false

# Turn this thing off if in production
logging.level.com.ecommerce.transaction=DEBUG
logging.level.com.ecommerce.transaction.service.impl.StripeServiceImpl=TRACE
logging.level.com.ecommerce.transaction.controller.StripeWebhookController=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.cloud=INFO
logging.level.com.netflix.eureka=INFO