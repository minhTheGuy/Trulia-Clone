version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: property-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce_properties
    volumes:
      - property-postgres-data:/var/lib/postgresql/data
    networks:
      - property-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-property
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - property-network
    restart: unless-stopped

networks:
  property-network:
    driver: bridge

volumes:
  property-postgres-data: 