spring.application.name=auth-service
server.port=0

# Eureka Registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
eureka.instance.prefer-ip-address=true

# JWT Properties
app.jwtSecret=CHANGE_ME_use_a_long_random_secret_at_least_32_chars
app.jwtExpirationMs=86400000
app.jwtCookieName=auth-token


# Frontend URL for CORS
frontend.url=http://localhost:5173

# User Service URL for Feign client - using service discovery properly
# Note: We don't need the /public part here as it's set in the @FeignClient path
user-service.url=http://user-service

# Increase logging for debugging
logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.ecommerce.auth=DEBUG

# Email (Gmail App) Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL_ADDRESS
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Email verification
app.email.verification.expiration=86400000
app.email.verification.url=${frontend.url}/verify?token=
app.email.reset-password.url=${frontend.url}/reset-password?token=

# OAuth2 - Google
# Register at https://console.cloud.google.com/ → APIs & Services → Credentials
# Add authorized redirect URI: http://localhost:8080/api/auth/oauth2/google/callback
oauth2.google.client-id=YOUR_GOOGLE_CLIENT_ID
oauth2.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
oauth2.google.redirect-uri=http://localhost:8080/api/auth/oauth2/google/callback
oauth2.google.token-uri=https://oauth2.googleapis.com/token
oauth2.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo

# OAuth2 - GitHub
# Register at https://github.com/settings/developers → OAuth Apps
# Add callback URL: http://localhost:8080/api/auth/oauth2/github/callback
oauth2.github.client-id=YOUR_GITHUB_CLIENT_ID
oauth2.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
oauth2.github.redirect-uri=http://localhost:8080/api/auth/oauth2/github/callback
oauth2.github.token-uri=https://github.com/login/oauth/access_token
oauth2.github.user-info-uri=https://api.github.com/user

# OAuth2 Frontend redirect after successful login
oauth2.frontend-redirect-uri=http://localhost:3000/oauth2/callback