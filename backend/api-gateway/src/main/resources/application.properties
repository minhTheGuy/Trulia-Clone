# API Gateway Configuration
spring.application.name=api-gateway
server.port=8080

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Enable service discovery
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# JWT Configuration
jwt.secret=ecommerceSecretKey123456789012345678901234567890
jwt.cookie.name=auth-token

# Actuator Configuration
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Debug Configuration
spring.cloud.gateway.httpclient.wiretap=true
spring.cloud.gateway.httpserver.wiretap=true

# Increase request timeout
spring.cloud.gateway.httpclient.response-timeout=30000

# CORS Configuration is now handled by CorsConfig.java
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=false
logging.level.org.springframework.cloud.gateway=DEBUG